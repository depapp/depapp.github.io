language: node_js
node_js: "stable"

cache:
  directories:
    - ~/.npm
    - ~/.cache

before_install:
  - stty cols 80

dist: trusty
sudo: required

addons:
  apt:
    sources:
     - google-chrome
    packages:
     - google-chrome-stable fluxbox

before_script:
  - "export DISPLAY=:99.0"
  - "sh -e /etc/init.d/xvfb start"
  - sleep 3
  - fluxbox >/dev/null 2>&1 &
  - npm install cypress
  - npm install chance

script:
  - cypress run